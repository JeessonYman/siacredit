<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA-Credit | Acceso Asesores</title>
    <style>
        body { margin: 0; background: linear-gradient(-45deg, #001f3f, #003366, #d11222, #001f3f); background-size: 400% 400%; animation: bg 15s ease infinite; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; color: white; padding: 15px; box-sizing: border-box; }
        @keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 30px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); box-sizing: border-box; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255, 255, 255, 0.1); color: white; outline: none; box-sizing: border-box; transition: 0.3s; font-size: 14px;}
        input::placeholder { color: rgba(255,255,255,0.6); }
        input:focus { background: rgba(255, 255, 255, 0.25); border-color: white; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: #d11222; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b00f1d; }
        .error-msg { background: rgba(231, 76, 60, 0.3); border: 1px solid #e74c3c; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px;}
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>SIA-Credit</h2>
        <p style="opacity: 0.8; font-size: 13px; margin-bottom: 20px;">Intranet de Asesores de Negocio</p>
        <div th:if="${error != null}" class="error-msg" th:text="${error}"></div>
        <form action="/login" method="POST">
            <input type="text" name="usuario" placeholder="Usuario (Ej: maria)" required autocomplete="off">
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar al Sistema</button>
        </form>
    </div>
</body>
</html>
